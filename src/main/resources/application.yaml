spring:
  application:
    name: training-metrics-api

  datasource:
    url: jdbc:postgresql://localhost:5432/training_metrics
    username: ${DB_USERNAME:training_user}
    password: ${DB_PASSWORD:training_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server:
  port: 8080

security:
  jwt:
    # DEV ONLY — use JWT_SECRET environment variable in production
    secret: AX4KBDMfvrWxZwNGReaNnt+/zyB9QvO5idwBHFTQ8Yg=
    expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true
